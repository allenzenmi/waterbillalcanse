<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Billing Statement System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Water Billing Statement</h2>
    
    <form id="billingForm">
        <div class="form-group">
            <label for="customerName">Customer Name</label>
            <input type="text" id="customerName" placeholder="Enter customer name">
        </div>
        
        <div class="form-group">
            <label for="consumption">Water Consumption (Cubic Meter)</label>
            <input type="number" id="consumption" placeholder="Enter cubic meters">
        </div>
        
        <div class="form-group">
            <label for="customerType">Customer Type</label>
            <select id="customerType">
                <option value="Regular">Regular</option>
                <option value="Senior Citizen">Senior Citizen</option>
                <option value="Solo Parent">Solo Parent</option>
            </select>
        </div>
        
        <div class="button-group">
            <button type="submit" class="btn-submit">Generate Bill</button>
            <button type="button" id="resetBtn" class="btn-reset">Clear</button>
        </div>
    </form>
    
    <div class="counter" id="transactionCounter">Transactions Processed : 0</div>
    
    <div class="statement-area" id="statementOutput"></div>
</div>
<script src="script.js"></script>
</body>
</html>
